Listen 80
Listen 443
ServerName localhost

LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_balancer_module modules/mod_proxy_balancer.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule lbmethod_byrequests_module modules/mod_lbmethod_byrequests.so
LoadModule slotmem_shm_module modules/mod_slotmem_shm.so
LoadModule status_module modules/mod_status.so
LoadModule rewrite_module modules/mod_rewrite.so

<VirtualHost *:80>
    <Location "/server-status">
        SetHandler server-status
        Require all granted
    </Location>
</VirtualHost>

<VirtualHost *:443>
    SSLEngine on
    SSLCertificateFile /usr/local/apache2/ssl/server.crt
    SSLCertificateKeyFile /usr/local/apache2/ssl/server.key

    SSLProxyEngine on
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off

    <Proxy balancer://webcluster>
        BalancerMember https://webapp1:5000
        BalancerMember https://webapp2:5000
    </Proxy>

    RewriteEngine On
    RewriteCond %{HTTP_USER_AGENT} "DDoS-Test-Agent"
    RewriteRule ^ - [R=429,L]

    ProxyPass / balancer://webcluster/
    ProxyPassReverse / balancer://webcluster/

    ErrorLog /usr/local/apache2/logs/error.log
    CustomLog /usr/local/apache2/logs/access.log combined
</VirtualHost>