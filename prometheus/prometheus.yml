global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'webapp'
    scheme: https
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ['webapp1:5000', 'webapp2:5000']

  - job_name: 'apache-exporter'
    static_configs:
      - targets: ['apache-exporter:9117']

  - job_name: 'ai-classifier'
    static_configs:
      - targets: ['ai-classifier:8000']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
