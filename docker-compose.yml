version: '3.8'

services:
  webapp1:
    build: ./webapp
    container_name: webapp1
    volumes:
      - ./apache/ssl:/ssl:ro
    networks:
      - webnet

  webapp2:
    build: ./webapp
    container_name: webapp2
    volumes:
      - ./apache/ssl:/ssl:ro
    networks:
      - webnet

  apache:
    build: ./apache
    container_name: apache
    ports:
      - "8082:80"
      - "443:443"
    volumes:
      - ./apache/ssl:/usr/local/apache2/ssl:ro
      - apache_logs:/usr/local/apache2/logs
    networks:
      - webnet
    depends_on:
      - webapp1
      - webapp2

  apache-exporter:
    image: lusotycoon/apache-exporter
    container_name: apache-exporter
    command:
      - "--scrape_uri=http://apache/server-status?auto"
    ports:
      - "9117:9117"
    networks:
      - webnet
    depends_on:
      - apache

  ai-classifier:
    build: ./ai-classifier
    container_name: ai-classifier
    ports:
      - "8000:8000"
    volumes:
      - apache_logs:/logs:ro
    networks:
      - webnet
    depends_on:
      - apache

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - webnet

  grafana:
    image: grafana/grafana
    container_name: grafana
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    networks:
      - webnet
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"
    networks:
      - webnet

  traffic-gen:
    build: ./traffic-gen
    container_name: traffic-gen
    networks:
      - webnet
    depends_on:
      - apache

volumes:
  apache_logs:

networks:
  webnet:
